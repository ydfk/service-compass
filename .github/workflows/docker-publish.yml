name: 构建 Docker 镜像与 Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  publish:
    name: 构建、推送并创建 Release
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 校验版本标签
        id: version
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "仅允许 v1.2.3 或 v1.2.3-rc.1 格式的标签"
            exit 1
          fi
          [[ "${GITHUB_REF_NAME}" == *-* ]] && prerelease=true || prerelease=false
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "stable=$([[ $prerelease == false ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: 配置 Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 生成镜像元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/service-compass
          flavor: latest=false
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ steps.version.outputs.stable }}

      - name: 构建并推送 amd64 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          pull: true
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: 准备 Release 资产
        run: |
          mkdir -p dist
          cp docker-compose.prod.yml dist/docker-compose.prod.yml

      - name: 创建或更新 GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ steps.version.outputs.prerelease }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --title "ServiceCompass ${GITHUB_REF_NAME}" \
              --prerelease="$PRERELEASE"
            while read -r asset; do
              [[ -z "$asset" ]] || gh release delete-asset "$GITHUB_REF_NAME" "$asset" --yes
            done < <(gh release view "$GITHUB_REF_NAME" --json assets --jq '.assets[].name')
          elif [[ "$PRERELEASE" == "true" ]]; then
            gh release create "$GITHUB_REF_NAME" --title "ServiceCompass ${GITHUB_REF_NAME}" --generate-notes --prerelease
          else
            gh release create "$GITHUB_REF_NAME" --title "ServiceCompass ${GITHUB_REF_NAME}" --generate-notes --latest
          fi
          gh release upload "$GITHUB_REF_NAME" dist/* --clobber
